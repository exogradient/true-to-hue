      <circle cx="14" cy="14" r="1.6" fill="#F4EDE3"/>
    </symbol>
    <symbol id="icon-sliders" viewBox="0 0 24 24">
      <line x1="5" y1="7" x2="19" y2="7" stroke="#F4EDE3" stroke-width="1.1" opacity="0.6"/><line x1="5" y1="12" x2="19" y2="12" stroke="#F4EDE3" stroke-width="1.1" opacity="0.6"/><line x1="5" y1="17" x2="19" y2="17" stroke="#F4EDE3" stroke-width="1.1" opacity="0.6"/>
      <circle cx="9" cy="7" r="2" fill="none" stroke="#F4EDE3" stroke-width="1.2"/><circle cx="15" cy="12" r="2" fill="none" stroke="#F4EDE3" stroke-width="1.2"/><circle cx="11" cy="17" r="2" fill="none" stroke="#F4EDE3" stroke-width="1.2"/>
    </symbol>

    <!-- Navigation & actions (Lucide) -->
    <symbol id="icon-confirm" viewBox="0 0 24 24">
      <path d="M20 6 9 17l-5-5"/>
    </symbol>
    <symbol id="icon-history" viewBox="0 0 24 24">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>
    </symbol>
    <symbol id="icon-home" viewBox="0 0 24 24">
      <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/>
      <path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
    </symbol>
    <symbol id="icon-replay" viewBox="0 0 24 24">
      <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
      <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
    </symbol>
    <symbol id="icon-back" viewBox="0 0 24 24">
      <path d="m15 18-6-6 6-6"/>
    </symbol>
    <symbol id="icon-forward" viewBox="0 0 24 24">
      <path d="m9 18 6-6-6-6"/>
    </symbol>
    <symbol id="icon-share" viewBox="0 0 24 24">
      <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
      <polyline points="16 6 12 2 8 6"/>
      <line x1="12" y1="2" x2="12" y2="15"/>
    </symbol>
    <symbol id="icon-copy" viewBox="0 0 24 24">
      <rect x="9" y="9" width="13" height="13" rx="2"/>
      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
    </symbol>
  </defs>
</svg>
