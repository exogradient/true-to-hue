<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gray-1: #080808;
    --gray-2: #101010;
    --gray-3: #161616;
    --gray-4: #1d1d1d;
    --gray-5: #272727;
    --gray-6: #323232;
    --gray-7: #404040;
    --gray-8: #5d5d5d;
    --gray-9: #777777;
    --gray-10: #949494;
    --gray-11: #b2b2b2;
    --gray-12: #ededed;

    --bg: var(--gray-1);
    --surface: #111111;
    --surface-strong: #151515;
    --surface-raised: #1a1a1a;
    --surface-elevated: #1e1e1e;
    --border: var(--gray-5);
    --border-strong: var(--gray-6);
    --border-subtle: rgba(255, 255, 255, 0.06);
    --border-focus: rgba(255, 255, 255, 0.18);
    --text: var(--gray-12);
    --text-dim: var(--gray-11);
    --text-muted: var(--gray-9);
    --text-soft: var(--gray-10);

    --shadow-card: 0 4px 16px rgba(0, 0, 0, 0.22);
    --shadow-elevated: 0 12px 32px rgba(0, 0, 0, 0.32);
    --glow-inner: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    --glow-inner-strong: inset 0 1px 0 rgba(255, 255, 255, 0.09);

    --tier-elite: #d4a86a;
    --tier-strong: #7abbc3;
    --tier-solid: #ada598;
    --tier-learning: #7a7a7a;

    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 24px;
    --space-6: 32px;
    --space-7: 48px;
    --space-8: 64px;
    --space-9: 96px;
    --space-10: 128px;

    --radius-sm: 6px;
    --radius: 14px;
    --radius-lg: 24px;
    --radius-pill: 999px;

    --ease-out: cubic-bezier(0.2, 0.8, 0.2, 1);
    --ease-sheet: cubic-bezier(0.32, 0.72, 0, 1);

    --duration-fast: 150ms;
    --duration-normal: 200ms;
    --duration-slow: 300ms;

    --shadow-soft: 0 18px 48px rgba(0, 0, 0, 0.22);
    --shadow-panel: 0 20px 60px rgba(0, 0, 0, 0.2);
    --shell-max: 1180px;
    --content-max: 560px;
    --font-display: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }

  html { background: var(--bg); }

  body {
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-weight: 400;
    background:
      radial-gradient(circle at 17% 18%, rgba(194, 147, 58, 0.1), transparent 22%),
      radial-gradient(circle at 72% 14%, rgba(86, 103, 182, 0.12), transparent 28%),
      linear-gradient(180deg, #181c22 0%, #101216 46%, #0a0b0d 100%);
    color: var(--text);
    min-height: 100svh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    opacity: 0;
    position: relative;
    overflow-x: hidden;
    transition: opacity 0.15s ease;
  }

  body.fonts-ready { opacity: 1; }
  body::before,
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -1;
  }
  body::before {
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 28%),
      radial-gradient(circle at 50% 20%, rgba(255, 255, 255, 0.02), transparent 34%);
    opacity: 1;
  }
  body::after { display: none; }

  h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.03em; }
  p { line-height: 1.5; }
  button, select, input { font: inherit; font-weight: 500; }

  .screen {
    display: none;
    width: 100%;
    min-height: 100svh;
    min-height: 100dvh;
    padding: var(--space-5);
    align-items: center;
    justify-content: center;
  }
  .screen.active {
    display: flex;
    animation: screen-in var(--duration-normal) var(--ease-out);
  }

  @keyframes screen-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .panel {
    background: var(--surface);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow:
      var(--glow-inner),
      inset 0 0 0 1px rgba(255, 255, 255, 0.03),
      var(--shadow-card);
    backdrop-filter: none;
    border-radius: var(--radius-lg);
  }
  .panel-raised {
    background: var(--surface-raised);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow:
      var(--glow-inner-strong),
      inset 0 0 0 1px rgba(255, 255, 255, 0.04),
      var(--shadow-card);
    border-radius: var(--radius-lg);
  }
  .panel-subtle {
    background: var(--surface);
    border: 1px solid var(--border-subtle);
    box-shadow: var(--glow-inner);
    border-radius: var(--radius-lg);
  }
  .eyebrow {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  button {
    background: var(--gray-12);
    color: var(--gray-1);
    border: none;
    border-radius: 16px;
    padding: 14px 20px;
    font-size: 0.92rem;
    font-weight: 500;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
    transition:
      transform var(--duration-fast) var(--ease-out),
      opacity var(--duration-fast),
      background var(--duration-fast) var(--ease-out),
      border-color var(--duration-fast) var(--ease-out),
      box-shadow var(--duration-fast) var(--ease-out);
  }
  button:hover {
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
  }
  button:active { transform: scale(0.97); box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2); }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  button:focus-visible {
    outline: 2px solid rgba(244, 237, 227, 0.92);
    outline-offset: 3px;
  }
  button.secondary {
    background: rgba(255, 255, 255, 0.04);
    color: var(--text);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: var(--glow-inner);
  }
  button.secondary:hover {
    background: rgba(255, 255, 255, 0.07);
    border-color: rgba(255, 255, 255, 0.15);
  }
  button.ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: none;
  }
  button.picker-chip:focus-visible,
  button.secondary.utility-history:focus-visible {
    outline: none;
    box-shadow:
      0 0 0 3px rgba(244, 237, 227, 0.14),
      inset 0 1px 0 rgba(255, 255, 255, 0.1);
  }
  button.ghost:hover {
    background: rgba(255, 255, 255, 0.04);
    border-color: rgba(255, 255, 255, 0.12);
  }
  .btn-row {
    display: flex;
    gap: var(--space-3);
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ═══════ MENU ═══════ */
  #menu.active {
    padding: 0;
    min-height: 100dvh;
    display: flex;
    align-items: stretch;
    justify-content: flex-start;
  }
  .menu-shell {
    width: min(100%, 1320px);
    min-height: 100dvh;
    margin: 0 auto;
    padding: clamp(var(--space-4), 3.2vw, var(--space-7));
    padding-top: calc(env(safe-area-inset-top, 0px) + clamp(var(--space-4), 4vw, var(--space-6)));
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + clamp(var(--space-4), 4vw, var(--space-6)));
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .menu-dock {
    padding: 0;
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    border-radius: 0;
    box-shadow: none;
  }
  .menu-dock-copy { display: none; }
  .menu-dock-title { display: none; }
  .menu-dock-actions {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: nowrap;
    width: auto;
    justify-content: flex-end;
  }
  .picker-segment {
    display: inline-flex;
    gap: 2px;
    flex: 0 1 auto;
    padding: 3px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 999px;
    box-shadow: none;
  }
  button.picker-chip {
    width: 28px;
    height: 28px;
    display: grid;
    place-items: center;
    background: transparent;
    color: rgba(237, 237, 237, 0.58);
    border: none;
    border-radius: 999px;
    padding: 0;
    font-size: inherit;
    line-height: normal;
    transform: none;
    box-shadow: none;
    transition:
      background var(--duration-fast) var(--ease-out),
      color var(--duration-fast),
      box-shadow var(--duration-fast) var(--ease-out);
  }
  button.picker-chip:hover {
    background: rgba(255, 255, 255, 0.045);
    color: rgba(237, 237, 237, 0.88);
  }
  button.picker-chip.active {
    background: rgba(255, 255, 255, 0.13);
    color: var(--text);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
  }
  .picker-chip-icon {
    width: 18px; height: 18px;
    display: grid; place-items: center;
    background: transparent;
    border: none; box-shadow: none;
  }
  button.picker-chip.active .picker-chip-icon {
    background: transparent;
    border-color: transparent;
  }
  .picker-chip-copy { display: none; }
  .picker-chip-note { display: none; }
  button.picker-chip svg {
    width: 18px; height: 18px;
    display: block;
    stroke-linecap: round; stroke-linejoin: round;
  }
  button.picker-chip:active {
    transform: none;
    opacity: 1;
  }
  .utility-history {
    width: 28px; height: 28px;
    display: inline-flex;
    align-items: center; justify-content: center;
    gap: 0; padding: 0;
    border-radius: 999px;
    background: transparent;
    border: none;
    box-shadow: none;
  }
  button.secondary.utility-history {
    border: none;
    background: transparent;
    color: rgba(237, 237, 237, 0.56);
  }
  button.secondary.utility-history:hover {
    background: rgba(255, 255, 255, 0.045);
    color: rgba(237, 237, 237, 0.88);
  }
  .utility-history svg {
    width: 15px; height: 15px;
    stroke: currentColor; fill: none;
    stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round;
  }
  .utility-history-title { display: none; }

  #countdown {
    text-align: center;
  }
  .countdown-shell {
    display: grid;
    gap: 0;
    justify-items: center;
    padding: clamp(var(--space-5), 6vw, var(--space-8));
  }
  .countdown-num {
    font-size: clamp(6rem, 28vw, 9rem);
    line-height: 0.92;
    font-weight: 700;
    letter-spacing: -0.08em;
    color: var(--text);
  }
  .countdown-num.exit {
    animation: digit-out var(--duration-fast) var(--ease-out) forwards;
  }
  .countdown-num.enter {
    animation: digit-in var(--duration-fast) var(--ease-out) forwards;
  }

  @keyframes digit-out {
    to { transform: translateY(20px); opacity: 0; filter: blur(4px); }
  }
  @keyframes digit-in {
    from { transform: translateY(-20px); opacity: 0; filter: blur(4px); }
    to { transform: translateY(0); opacity: 1; filter: blur(0); }
  }

  #memorize {
    padding: 0;
    width: 100%;
    height: 100dvh;
    min-height: 100dvh;
    position: relative;
    gap: 0;
    align-items: stretch;
    justify-content: stretch;
  }
  .color-grid {
    display: flex;
    width: 100%;
    height: 100%;
    flex: 1;
    min-height: 100%;
  }
  .color-swatch {
    flex: 1;
    min-height: 100%;
    border-radius: 0;
    border: none;
  }
  .memorize-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: var(--space-4) var(--space-5);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-2);
    text-shadow: 0 1px 4px rgba(0,0,0,0.7);
  }
  .memorize-overlay.on-dark {
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .memorize-pill {
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-pill);
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(14px);
    font-size: 0.76rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .on-dark .memorize-pill {
    background: rgba(255, 255, 255, 0.2);
    border-color: rgba(255, 255, 255, 0.25);
  }
  .memorize-pill,
  #timerText {
    display: none;
  }
  .timer-bar {
    width: min(320px, 82vw);
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    overflow: hidden;
  }
  .timer-fill {
    height: 100%;
    background: rgba(255,255,255,0.82);
    transition: width 0.1s linear;
    position: relative;
  }
  .timer-fill::after {
    content: '';
    position: absolute;
    right: -2px;
    top: -3px;
    width: 6px;
    height: 10px;
    border-radius: 3px;
    background: rgba(255,255,255,0.9);
    box-shadow: 0 0 8px rgba(255,255,255,0.5), 0 0 16px rgba(255,255,255,0.2);
  }

  #pick {
    width: 100%;
    padding: clamp(var(--space-4), 4vw, var(--space-6));
    align-items: stretch;
    justify-content: flex-start;
  }
  .play-shell {
    width: min(100%, 480px);
    margin: 0 auto;
    display: grid;
    gap: var(--space-4);
    align-content: center;
  }
  .play-header {
    display: none;
  }
  .pick-progress {
    font-size: clamp(1.8rem, 4.8vw, 2.6rem);
    line-height: 1;
    letter-spacing: -0.06em;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .reveal-progress {
    font-size: clamp(1rem, 3vw, 1.25rem);
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .reveal-progress-dim {
    color: var(--text-muted);
  }
  /* pick-readout-wrap hidden via .play-header { display: none } */
  .pick-hsb {
    font-size: 0.88rem;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .play-stage-row {
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
    background: var(--surface);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow:
      var(--glow-inner),
      inset 0 0 0 1px rgba(255, 255, 255, 0.03),
      var(--shadow-card);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  #pick[data-mode="picture"] {
    align-items: center;
    justify-content: center;
  }
  #pick[data-mode="picture"] .play-shell {
    align-content: center;
  }
  /* play-header already hidden globally */
  #pick[data-mode="picture"] .play-stage-row {
    grid-template-columns: minmax(0, 1fr);
  }
  #pick[data-mode="picture"] .picker-panel {
    display: none;
  }
  .stage-panel {
    padding: 0;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: transparent;
    border: none;
    box-shadow: none;
    border-radius: 0;
  }
  .preview-swatch {
    width: 100%;
    flex: 1;
    min-height: clamp(140px, 28svh, 240px);
    border-radius: 0;
    border: none;
  }
  .picker-panel {
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 0;
    flex: 1;
    min-width: 0;
    min-height: 0;
    background: transparent;
    border: none;
    box-shadow: none;
    border-radius: 0;
  }
  .picker-panel .slider-group {
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }
  /* swatchArea is .stage-panel — styled there */
  .stage-frame {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100%;
  }
  .picture-stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
    min-height: 100%;
  }
  .stage-head { display: none; }
  .stage-title {
    font-size: clamp(1.25rem, 4vw, 1.8rem);
    letter-spacing: -0.05em;
  }
  .picker-meta {
    display: flex;
    align-items: start;
    justify-content: space-between;
    gap: var(--space-4);
  }
  .picker-meta {
    display: none;
  }
  .picker-title {
    color: var(--text-soft);
    font-size: 0.92rem;
  }
  .picker-note {
    color: var(--text-muted);
    font-size: 0.76rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-align: right;
  }
  #pickerContainer {
    width: 100%;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .picker-empty { display: none; }
  .confirm-btn {
    position: absolute;
    z-index: 2;
    top: var(--space-2);
    right: var(--space-2);
    width: 44px;
    height: 44px;
    padding: 0;
    display: inline-grid;
    place-items: center;
    font-size: 0;
    min-height: 0;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(12px) saturate(1.4);
    -webkit-backdrop-filter: blur(12px) saturate(1.4);
    color: rgba(255, 255, 255, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow:
      0 2px 8px rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.1);
    transition:
      background var(--duration-fast) var(--ease-out),
      transform var(--duration-fast) var(--ease-out);
  }
  .confirm-btn:hover:not(:disabled) {
    background: rgba(0, 0, 0, 0.55);
    transform: scale(1.08);
  }
  .confirm-btn:active:not(:disabled) {
    transform: scale(0.95);
  }
  .confirm-btn svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .confirm-btn:disabled {
    opacity: 0;
    pointer-events: none;
  }
  .confirm-btn[hidden] {
    display: none;
  }
  .picture-target {
    font-size: clamp(1.7rem, 7vw, 2.5rem);
    line-height: 1;
    text-align: center;
    letter-spacing: 0.02em;
    font-variant-numeric: tabular-nums;
    word-spacing: 0.15em;
    padding: var(--space-4) var(--space-5);
  }
  .hsb-label {
    color: var(--text-muted);
    font-size: 0.72em;
    font-weight: 400;
    letter-spacing: 0.04em;
    margin-right: 0.06em;
  }
  .picture-choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    width: 100%;
    flex: 1;
    background: rgba(255, 255, 255, 0.08);
  }
  .picture-stage-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: auto;
  }
  .picture-choice {
    border-radius: 0;
    cursor: pointer;
    aspect-ratio: 1.2;
    border: none;
    transition:
      opacity var(--duration-fast) var(--ease-out),
      box-shadow var(--duration-fast) var(--ease-out);
  }
  .picture-choice.selected {
    box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.85);
  }

  /* ═══════ SPLIT IT ═══════ */
  #pick[data-mode="split"] {
    align-items: center;
    justify-content: center;
  }
  #pick[data-mode="split"] .play-shell {
    width: min(100%, 560px);
    align-content: center;
  }
  #pick[data-mode="split"] .play-stage-row {
    grid-template-columns: minmax(0, 1fr);
  }
  #pick[data-mode="split"] .picker-panel {
    display: none;
  }
  .split-stage {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .split-swatch {
    width: 100%;
    aspect-ratio: 1.5;
  }
  .split-sliders {
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
    padding: var(--space-4);
  }
  .split-slider-row {
    display: flex;
    flex-direction: column;
    gap: var(--space-1);
  }
  .split-slider-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 0 2px;
  }
  .split-slider-dim {
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .split-slider-endpoints {
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }
  .split-slider-track {
    position: relative;
    height: clamp(36px, 6svh, 48px);
    border-radius: var(--radius-lg);
    box-shadow:
      inset 0 1px 3px rgba(0, 0, 0, 0.25),
      0 1px 0 rgba(255, 255, 255, 0.05);
  }
  .split-track-neutral {
    background: var(--surface-raised);
  }
  .split-readout {
    position: absolute;
    top: -22px;
    transform: translateX(-50%);
    font-size: 0.7rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--text-dim);
    pointer-events: none;
    white-space: nowrap;
  }
  .split-slider-track input[type="range"] {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .split-hue-ticks {
    position: relative;
    height: 10px;
    pointer-events: none;
    margin-top: 2px;
  }
  .split-hue-dot, .split-intensity-dot {
    position: absolute;
    top: 0;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    transform: translateX(-50%);
  }
  .split-hue-dot {
    opacity: 0.7;
  }
  .split-intensity-dots {
    position: relative;
    height: 10px;
    pointer-events: none;
    margin-top: 2px;
  }
  .split-intensity-dot {
    background: white;
  }

  /* ═══════ CALL IT ═══════ */
  #pick[data-mode="call"] {
    align-items: center;
    justify-content: center;
  }
  #pick[data-mode="call"] .play-shell {
    align-content: center;
  }
  #pick[data-mode="call"] .play-stage-row {
    grid-template-columns: minmax(0, 1fr);
  }
  #pick[data-mode="call"] .picker-panel {
    display: none;
  }
  .call-stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
    min-height: 100%;
  }
  .call-swatch {
    width: 100%;
    min-height: clamp(120px, 22svh, 200px);
    flex-shrink: 0;
  }
  .call-choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    width: 100%;
    flex: 1;
    background: rgba(255, 255, 255, 0.06);
  }
  .call-choice {
    border-radius: 0;
    background: var(--surface);
    color: var(--text);
    border: none;
    padding: var(--space-4) var(--space-3);
    font-size: clamp(1rem, 3.5vw, 1.15rem);
    font-weight: 500;
    text-align: center;
    cursor: pointer;
    line-height: 1.25;
    min-height: 44px;
    display: grid;
    place-items: center;
    box-shadow: none;
    transition:
      background var(--duration-fast) var(--ease-out),
      color var(--duration-fast);
  }
  .call-choice:active {
    background: var(--surface-elevated);
    transform: none;
  }

  /* Reveal — call mode name bar */
  .reveal-call-names {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: var(--space-1) var(--space-3);
    align-items: baseline;
    padding: 0 var(--space-5) var(--space-4);
    font-size: 0.84rem;
  }
  .reveal-call-label {
    font-size: 0.66rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .reveal-call-name {
    font-weight: 500;
    color: var(--text);
  }
  .reveal-call-name.call-correct { color: var(--tier-strong); }
  .reveal-call-name.call-wrong { color: var(--text-dim); }

  .xkcd-link {
    color: inherit;
    text-decoration-color: rgba(255, 255, 255, 0.2);
    text-underline-offset: 2px;
    text-decoration-thickness: 1px;
    transition: text-decoration-color var(--duration-fast);
  }
  .xkcd-link:hover {
    text-decoration-color: rgba(255, 255, 255, 0.5);
  }
  /* preview-swatch min-height set above with stage-panel */
  .match-compare {
    display: grid;
    grid-template-columns: 1fr 1px 1fr;
    width: 100%;
    aspect-ratio: 2;
  }
  .match-compare-divider {
    background: rgba(255, 255, 255, 0.1);
  }
  .match-compare-col {
    position: relative;
  }
  .match-compare-swatch {
    width: 100%;
    height: 100%;
    border-radius: 0;
    border: none;
  }
  .match-compare-label {
    position: absolute;
    bottom: var(--space-2);
    left: 0;
    right: 0;
    font-size: 0.62rem;
    color: rgba(255, 255, 255, 0.7);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-align: center;
    text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
    pointer-events: none;
  }

  .slider-group {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
    padding: var(--space-4);
  }
  .slider-row {
    display: flex;
    align-items: center;
    gap: var(--space-3);
  }
  .slider-label {
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    width: 1.2em;
    text-align: right;
    flex-shrink: 0;
  }
  .slider-track-wrap {
    flex: 1;
    position: relative;
    height: clamp(36px, 6svh, 52px);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow:
      inset 0 1px 3px rgba(0, 0, 0, 0.25),
      0 1px 0 rgba(255, 255, 255, 0.05);
  }
  input[type="range"] {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    -webkit-appearance: none;
    border-radius: 0;
    background: transparent;
    outline: none;
    touch-action: none;
    cursor: pointer;
    margin: 0;
  }
  input[type="range"]:focus-visible {
    outline: 2px solid rgba(244, 237, 227, 0.9);
    outline-offset: 3px;
    border-radius: var(--radius-lg);
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 6px;
    height: clamp(36px, 6svh, 52px);
    border-radius: 3px;
    background: white;
    border: none;
    cursor: pointer;
    box-shadow:
      0 0 0 3px rgba(255, 255, 255, 0.25),
      0 2px 8px rgba(0, 0, 0, 0.5);
  }

  .field-picker {
    width: 100%;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .hue-bar {
    width: 100%;
    height: 44px;
    border-radius: 0;
    cursor: crosshair;
    position: relative;
    background: linear-gradient(to right,
      hsl(0,100%,50%), hsl(60,100%,50%), hsl(120,100%,50%),
      hsl(180,100%,50%), hsl(240,100%,50%), hsl(300,100%,50%), hsl(360,100%,50%));
    touch-action: none;
  }
  .hue-thumb {
    position: absolute;
    inset: 4px auto 4px 0;
    width: 8px;
    background: white;
    border-radius: 999px;
    pointer-events: none;
    box-shadow:
      0 0 0 3px rgba(255, 255, 255, 0.25),
      0 2px 8px rgba(0, 0, 0, 0.5);
    transform: translateX(-4px);
  }
  .sb-field {
    width: 100%;
    aspect-ratio: 1.15;
    border-radius: 0;
    cursor: crosshair;
    position: relative;
    overflow: hidden;
    touch-action: none;
    border: none;
  }
  .sb-field-bg { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
  .sb-thumb {
    position: absolute;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2.5px solid white;
    box-shadow:
      0 0 0 3px rgba(255, 255, 255, 0.2),
      0 4px 14px rgba(0, 0, 0, 0.5);
    pointer-events: none;
    transform: translate(-13px, -13px);
  }

  #results {
    padding-block: clamp(var(--space-5), 6vw, var(--space-8));
  }
  .results-shell {
    width: min(100%, 920px);
    display: grid;
    gap: var(--space-4);
  }
  #resultCards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--space-3);
    align-items: start;
  }
  .results-hero {
    padding: var(--space-5);
    display: grid;
    gap: var(--space-2);
    cursor: pointer;
    background: var(--surface);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow:
      var(--glow-inner),
      inset 0 0 0 1px rgba(255, 255, 255, 0.03),
      var(--shadow-card);
    border-radius: var(--radius-lg);
  }
  .results-hero-head {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: var(--space-4);
  }
  .score-cluster {
    display: flex;
    align-items: baseline;
    gap: var(--space-2);
  }
  .total-score {
    font-size: clamp(4rem, 14vw, 6.6rem);
    line-height: 0.88;
    letter-spacing: -0.08em;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    transition: color var(--duration-slow) var(--ease-out);
  }
  .total-score.tier-elite { color: var(--tier-elite); }
  .total-score.tier-strong { color: var(--tier-strong); }
  .total-score.tier-solid { color: var(--tier-solid); }
  .total-label {
    font-size: 0.78rem;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .score-tier {
    padding: 0;
    border-radius: 0;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: color var(--duration-slow) var(--ease-out);
  }
  .score-tier.tier-elite { color: var(--tier-elite); }
  .score-tier.tier-strong { color: var(--tier-strong); }
  .score-tier.tier-solid { color: var(--tier-solid); }
  .analysis-hint {
    color: var(--text-muted);
    font-size: 0.82rem;
  }
  .analysis-hint,
  .feedback-text,
  .result-names,
  .result-verdict {
    display: none;
  }
  .result-card {
    width: 100%;
    padding: 0;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: end;
    cursor: pointer;
    animation: card-in var(--duration-slow) var(--ease-out) backwards;
  }
  .result-card > div:first-child {
    grid-column: 1 / -1;
    width: 100%;
  }
  .result-card.tier-rough { opacity: 0.88; }
  .swatch-compare {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    height: auto;
    flex-shrink: 0;
    border-radius: calc(var(--radius) - 4px);
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
  }
  .swatch-target, .swatch-guess {
    position: absolute; inset: 0;
  }
  .swatch-target { clip-path: polygon(0 0, 100% 0, 0 100%); }
  .swatch-guess { clip-path: polygon(100% 0, 100% 100%, 0 100%); }
  .swatch-divider {
    position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(135deg, transparent calc(50% - 0.5px), var(--gray-5) calc(50% - 0.5px), var(--gray-5) calc(50% + 0.5px), transparent calc(50% + 0.5px));
  }
  .result-info {
    display: grid;
    gap: 0;
    min-width: 0;
  }
  .result-head {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 0;
  }
  .result-names {
    color: var(--text-soft);
    font-size: 0.84rem;
  }
  .result-card.call-card {
    grid-template-columns: 1fr;
    gap: var(--space-1);
    text-align: center;
  }
  .result-card.call-card .result-info,
  .result-card.call-card .result-score {
    grid-column: 1 / -1;
  }
  .result-card.call-card .result-head {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .result-card.call-card .result-score {
    display: none;
  }
  .call-result-name {
    font-size: 0.84rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.25;
  }
  .call-result-yours {
    font-size: 0.7rem;
    color: var(--text-muted);
    line-height: 1.25;
  }
  .result-verdict {
    color: var(--text);
    font-size: 1rem;
    letter-spacing: -0.03em;
  }
  .result-score {
    font-size: 1.35rem;
    font-weight: 700;
    min-width: 0;
    text-align: right;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.05em;
  }
  .result-score span {
    display: inline;
  }
  .result-detail {
    color: var(--text-dim);
    font-size: 0.78rem;
    line-height: 1.55;
    font-variant-numeric: tabular-nums;
  }
  .feedback-text {
    font-size: 0.94rem;
    color: var(--text-soft);
    max-width: 36rem;
  }
  .result-detail-wrap { display: none; }
  .result-detail-wrap.visible { display: block; }
  .delta-grid {
    display: grid;
    gap: var(--space-2);
    margin-top: var(--space-3);
  }
  .delta-row {
    display: grid;
    grid-template-columns: 30px 1fr auto;
    align-items: center;
    gap: var(--space-2);
    color: var(--text-muted);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .delta-track {
    height: 6px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.08);
    overflow: hidden;
  }
  .delta-fill {
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.55));
  }
  .delta-value {
    color: var(--text-soft);
    font-variant-numeric: tabular-nums;
    text-transform: none;
  }
  .results-actions {
    justify-content: flex-start;
  }
  .results-icon-btn {
    width: 52px;
    height: 52px;
    padding: 0;
    border-radius: 999px;
    display: inline-grid;
    place-items: center;
    box-shadow: var(--glow-inner);
  }
  .results-icon-btn:hover {
    background: rgba(255, 255, 255, 0.06);
    border-color: rgba(255, 255, 255, 0.14);
  }
  .results-icon-btn svg {
    width: 20px;
    height: 20px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .history-shell {
    width: min(100%, 760px);
    padding: clamp(var(--space-3), 4vw, var(--space-7));
    display: grid;
    gap: var(--space-4);
    background: var(--surface);
    box-shadow:
      var(--glow-inner),
      inset 0 0 0 1px rgba(255, 255, 255, 0.03),
      var(--shadow-elevated);
    overflow: hidden;
  }
  .history-top {
    display: flex;
    justify-content: flex-start;
  }
  .reveal-nav-btn {
    position: absolute;
    z-index: 2;
    top: var(--space-2);
    width: 44px;
    height: 44px;
    padding: 0;
    display: inline-grid;
    place-items: center;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(12px) saturate(1.4);
    -webkit-backdrop-filter: blur(12px) saturate(1.4);
    color: rgba(255, 255, 255, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.18);
    box-shadow:
      0 2px 8px rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.08);
    cursor: pointer;
    transition:
      background var(--duration-fast) var(--ease-out),
      transform var(--duration-fast) var(--ease-out);
  }
  .reveal-nav-btn:nth-of-type(1) { left: var(--space-2); }
  .reveal-nav-btn:nth-of-type(2) { right: var(--space-2); }
  .reveal-nav-btn:hover {
    background: rgba(0, 0, 0, 0.55);
    transform: scale(1.08);
  }
  .reveal-nav-btn:active {
    transform: scale(0.95);
  }
  .reveal-nav-btn.ghost {
    background: rgba(0, 0, 0, 0.25);
    color: rgba(255, 255, 255, 0.7);
  }
  .reveal-nav-btn.ghost:hover {
    background: rgba(0, 0, 0, 0.4);
    color: rgba(255, 255, 255, 0.92);
  }
  .reveal-nav-btn svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .icon-btn {
    width: 42px;
    height: 42px;
    padding: 0;
    border-radius: 999px;
    display: inline-grid;
    place-items: center;
    background: rgba(255, 255, 255, 0.03);
    color: var(--text);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: var(--glow-inner);
    transition:
      background var(--duration-fast) var(--ease-out),
      border-color var(--duration-fast) var(--ease-out);
  }
  .icon-btn:hover {
    background: rgba(255, 255, 255, 0.06);
    border-color: rgba(255, 255, 255, 0.14);
  }
  .icon-btn svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.9;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .utility-history.icon-btn {
    width: auto;
    height: 36px;
    padding: 0 12px;
    display: inline-flex;
    border-radius: 999px;
    justify-content: center;
    gap: 8px;
  }
  .history-list {
    width: 100%;
    display: grid;
    gap: 10px;
  }
  .history-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-4);
    padding: 14px 16px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    box-shadow: var(--glow-inner);
    transition:
      background var(--duration-fast) var(--ease-out),
      border-color var(--duration-fast) var(--ease-out);
  }
  .history-row:hover {
    background: rgba(255, 255, 255, 0.06);
    border-color: rgba(255, 255, 255, 0.08);
  }
  .history-entry {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .history-icon {
    width: 40px;
    height: 40px;
    display: inline-grid;
    place-items: center;
    flex: 0 0 auto;
    color: var(--text);
    background: rgba(255, 255, 255, 0.04);
    border-radius: 14px;
  }
  .history-icon svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.7;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .history-meta {
    display: grid;
    gap: 2px;
  }
  .history-mode {
    display: none;
  }
  .history-sub {
    color: var(--text-muted);
    font-size: 0.78rem;
  }
  .history-score {
    color: var(--text);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.03em;
  }

  .result-card {
    animation: card-in var(--duration-slow) var(--ease-out) both;
  }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .total-score {
    animation: score-in 400ms var(--ease-sheet) both;
  }

  @keyframes score-in {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  @media (hover: hover) {
    button:hover:not(.menu-mode):not(.picker-chip):not(.confirm-btn):not(.secondary):not(.ghost):not(.call-choice) {
      opacity: 0.96;
    }
    .picture-choice:hover {
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.3);
    }
    .call-choice:hover {
      background: var(--surface-raised);
    }
  }

  @media (min-width: 768px) {
    #menu.active {
      width: 100%;
      align-items: stretch;
      padding: clamp(20px, 2.6vw, 32px) clamp(26px, 3.6vw, 48px) clamp(24px, 3vw, 36px);
    }
    .menu-shell {
      width: min(100%, 1320px);
      min-height: calc(100dvh - clamp(40px, 5vw, 72px));
      padding: 0;
    }
    #resultCards {
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }
  }

  @media (max-width: 540px) {
    .menu-shell {
      width: min(100%, 640px);
    }
    #pick {
      padding-inline: var(--space-4);
    }
    .play-shell {
      gap: var(--space-3);

<script>
// --- Analytics guard (no-op stub if analytics.js failed to load) ---
if (!window.analytics) {
  var noop = function(){};
  window.analytics = { sessionStarted:noop, gameStarted:noop, memorizeStarted:noop,
    pickStarted:noop, pickerAdjusted:noop, roundCompleted:noop, gameCompleted:noop,
    gameAbandoned:noop, pickerSwitched:noop };
}

// --- Icon helper — references /icons.svg sprite sheet ---
function icon(name, ariaHidden = true) {
  return `<svg${ariaHidden ? ' aria-hidden="true"' : ''}><use href="/icons.svg#icon-${name}"></use></svg>`;
}

// --- Font loading gate ---
Promise.race([
  document.fonts.ready,
  new Promise(r => setTimeout(r, 1200))
]).then(() => document.body.classList.add('fonts-ready'));
// Hard fallback — if nothing fires (e.g. fonts API missing), show after 2s
setTimeout(() => document.body.classList.add('fonts-ready'), 2000);

// --- State ---
let targetColors, guesses, currentPick, lastMode, pictureChoices, callChoices, selectedChoice;
let roundResults = [];
let showHistoryMode = 'play';
let memorizeTimer = null;
let pickerType;
try { pickerType = localStorage.getItem('pickerType') || 'field'; }
catch { pickerType = 'field'; }
let currentHSB = { h: 180, s: 50, b: 50 };
let showAdvanced = new URLSearchParams(window.location.search).has('advanced');
let challengeCode = null;
let challengePlayerName = null;
let _nameCallback = null;

document.body.dataset.screen = 'menu';
updatePickerControl();


// --- Navigation ---
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.body.dataset.screen = id;
}
function goMenu() {
  analytics.gameAbandoned(lastMode, pickerType, guesses ? guesses.length : 0, document.body.dataset.screen);
  if (memorizeTimer) { clearInterval(memorizeTimer); memorizeTimer = null; }
  challengeCode = null;
  challengePlayerName = null;
  showScreen('menu');
}

function setPicker(type) {
  if (pickerType === type) return;
  var oldPicker = pickerType;
  pickerType = type;
  analytics.pickerSwitched(oldPicker, type, !!targetColors && currentPick < 5);
  try { localStorage.setItem('pickerType', pickerType); } catch {}
  updatePickerControl();
  if (document.body.dataset.screen === 'pick' && lastMode && lastMode !== 'picture' && lastMode !== 'call' && lastMode !== 'split') {
    renderPicker();
    initPickStage();
  }
}

function updatePickerControl() {
  document.getElementById('pickerFieldBtn').classList.toggle('active', pickerType === 'field');
  document.getElementById('pickerSlidersBtn').classList.toggle('active', pickerType === 'sliders');
  document.getElementById('pickerFieldBtn').setAttribute('aria-pressed', String(pickerType === 'field'));
  document.getElementById('pickerSlidersBtn').setAttribute('aria-pressed', String(pickerType === 'sliders'));
}

function modeLabel(mode) {
  const labels = { play: 'Play', match: 'Match It', picture: 'Picture It', call: 'Call It', split: 'Split It' };
  return labels[mode] || mode;
}

function modeIconMarkup(mode, className = '') {
  const cls = className ? ` class="${className}"` : '';
  const map = { play: 'play', match: 'match', picture: 'picture', call: 'call', split: 'split' };
  const name = map[mode] || 'play';
  return `<span${cls} aria-hidden="true">${icon(name)}</span>`;
}

function pickerLabel(type) {
  const labels = { field: 'Field', sliders: 'Sliders' };
  return labels[type] || type;
}

function confirmIconMarkup() {
  return icon('forward');
}

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function buildPictureFallbackChoices(target, index) {
  const variants = [
    { h: 32, s: -18, b: 12 },
    { h: -44, s: 16, b: -14 },
    { h: 96, s: -10, b: -8 },
  ];
  const options = [target, ...variants.map((shift, i) => ({
    h: (target.h + shift.h + 360) % 360,
    s: clamp(target.s + shift.s + (index % 2 ? i * 3 : -i * 2), 35, 100),
    b: clamp(target.b + shift.b + (index % 2 ? -i * 2 : i * 3), 35, 100),
  }))];
  const rotateBy = index % options.length;
  return options.map((_, i) => options[(i + rotateBy) % options.length]);
}

function pictureOptionsFor(index) {
  const options = Array.isArray(pictureChoices) ? pictureChoices[index] : null;
  if (Array.isArray(options) && options.length >= 4) return options;
  const target = targetColors?.[index];
  return target ? buildPictureFallbackChoices(target, index) : [];
}

function animateScore(el, target, minDur, maxDur, scale) {
  if (matchMedia('(prefers-reduced-motion: reduce)').matches) {
    el.textContent = target.toFixed(1);
    return;
  }
  const duration = Math.min(maxDur, Math.max(minDur, target * scale));
  const start = performance.now();
  function tick(now) {
    const t = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - t, 3);
    el.textContent = (eased * target).toFixed(1);
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

}

// --- HSB to CSS ---
function hsbToHsl(h, s, b) {
  const sN = s / 100, bN = b / 100;
  const l = bN * (1 - sN / 2);
  const sl = l === 0 || l === 1 ? 0 : (bN - l) / Math.min(l, 1 - l);
  return `hsl(${h}, ${(sl * 100).toFixed(1)}%, ${(l * 100).toFixed(1)}%)`;
}

function formatHSBCompact(color) {
  return `<span class="hsb-label">H</span>${Math.round(color.h)} <span class="hsb-label">S</span>${Math.round(color.s)} <span class="hsb-label">B</span>${Math.round(color.b)}`;
}

// --- Color Math (CIEDE2000 scoring, ported from Python) ---
// --- Shared scorer block: start ---
const SCORING_PARAMS = {
  curve: { divisor: 10, exponent: 2.25 },
  hueRecovery: { thresholdDegrees: 33, lostPointRate: 0.55 },
  guardPenalty: { sameHueSbPenaltyRate: 0.25, midHuePenaltyRate: 0.30 },
  sameHueRescue: { lowScoreBoost: 0.0, midScoreBoost: 0.0 },
  tiers: { elite: 8.5, strong: 5.5, learning: 2.5 },
};

function hsbToRgb(h, s, b) {
  const sN = s / 100, bN = b / 100;
  const c = bN * sN;
  const hp = h / 60;
  const x = c * (1 - Math.abs(hp % 2 - 1));
  const m = bN - c;
  let r, g, bl;
  if (hp < 1) { r = c; g = x; bl = 0; }
  else if (hp < 2) { r = x; g = c; bl = 0; }
  else if (hp < 3) { r = 0; g = c; bl = x; }
  else if (hp < 4) { r = 0; g = x; bl = c; }
  else if (hp < 5) { r = x; g = 0; bl = c; }
  else { r = c; g = 0; bl = x; }
  return [r + m, g + m, bl + m];
}

function srgbToLinear(c) {
  return c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
}

function rgbToXyz(r, g, b) {
  r = srgbToLinear(r); g = srgbToLinear(g); b = srgbToLinear(b);
  return [
    0.4124564*r + 0.3575761*g + 0.1804375*b,
    0.2126729*r + 0.7151522*g + 0.0721750*b,
    0.0193339*r + 0.1191920*g + 0.9503041*b,
  ];
}

function xyzToLab(x, y, z) {
  const xn = 0.95047, yn = 1.0, zn = 1.08883;
  function f(t) { return t > 0.008856 ? Math.cbrt(t) : 7.787 * t + 16/116; }
  const fx = f(x/xn), fy = f(y/yn), fz = f(z/zn);
  return [116*fy - 16, 500*(fx - fy), 200*(fy - fz)];
}

function hsbToLab(h, s, b) {
  const [r, g, bl] = hsbToRgb(h, s, b);
  const [x, y, z] = rgbToXyz(r, g, bl);
  return xyzToLab(x, y, z);
}

function deltaE2000(lab1, lab2) {
  const [L1, a1, b1] = lab1;
  const [L2, a2, b2] = lab2;
  const C1 = Math.sqrt(a1*a1 + b1*b1);
  const C2 = Math.sqrt(a2*a2 + b2*b2);
  const Cavg = (C1 + C2) / 2;
  const Cavg7 = Math.pow(Cavg, 7);
  const G = 0.5 * (1 - Math.sqrt(Cavg7 / (Cavg7 + Math.pow(25, 7))));
  const a1p = a1 * (1 + G);
  const a2p = a2 * (1 + G);
  const C1p = Math.sqrt(a1p*a1p + b1*b1);
  const C2p = Math.sqrt(a2p*a2p + b2*b2);
  const h1p = (Math.atan2(b1, a1p)*180/Math.PI + 360) % 360;
  const h2p = (Math.atan2(b2, a2p)*180/Math.PI + 360) % 360;
  const dLp = L2 - L1;
  const dCp = C2p - C1p;
  let dhp;
  if (C1p*C2p === 0) dhp = 0;
  else if (Math.abs(h2p - h1p) <= 180) dhp = h2p - h1p;
  else if (h2p - h1p > 180) dhp = h2p - h1p - 360;
  else dhp = h2p - h1p + 360;
  const dHp = 2 * Math.sqrt(C1p*C2p) * Math.sin(dhp/2 * Math.PI/180);
  const Lpavg = (L1 + L2) / 2;
  const Cpavg = (C1p + C2p) / 2;
  let hpavg;
  if (C1p*C2p === 0) hpavg = h1p + h2p;
  else if (Math.abs(h1p - h2p) <= 180) hpavg = (h1p + h2p) / 2;
  else if (h1p + h2p < 360) hpavg = (h1p + h2p + 360) / 2;
  else hpavg = (h1p + h2p - 360) / 2;
  const T = 1
    - 0.17*Math.cos((hpavg - 30)*Math.PI/180)
    + 0.24*Math.cos(2*hpavg*Math.PI/180)
    + 0.32*Math.cos((3*hpavg + 6)*Math.PI/180)
    - 0.20*Math.cos((4*hpavg - 63)*Math.PI/180);
  const SL = 1 + 0.015 * Math.pow(Lpavg - 50, 2) / Math.sqrt(20 + Math.pow(Lpavg - 50, 2));
  const SC = 1 + 0.045 * Cpavg;
  const SH = 1 + 0.015 * Cpavg * T;
  const Cpavg7 = Math.pow(Cpavg, 7);
  const RT = -Math.sin(60*Math.exp(-Math.pow((hpavg - 275)/25, 2))*Math.PI/180)
    * 2 * Math.sqrt(Cpavg7 / (Cpavg7 + Math.pow(25, 7)));
  const dE = Math.sqrt(
    Math.pow(dLp/SL, 2) + Math.pow(dCp/SC, 2) + Math.pow(dHp/SH, 2)
    + RT * (dCp/SC) * (dHp/SH)
  );
  return [dE, dLp, dCp, dHp];
}

function hueDistance(h1, h2) {
  const d = Math.abs(h1 - h2);
  return d > 180 ? 360 - d : d;
}

function scoreFromDeltaE(de) {
  return Math.round(
    10 / (1 + Math.pow(de / SCORING_PARAMS.curve.divisor, SCORING_PARAMS.curve.exponent)) * 100
  ) / 100;
}

const HUE_NAMES = [
  [15,'Red'],[40,'Orange'],[65,'Yellow'],[150,'Green'],
  [195,'Cyan'],[250,'Blue'],[295,'Purple'],[330,'Pink'],[360,'Red'],
];
function hueName(h) {
  for (const [b, n] of HUE_NAMES) { if (h < b) return n; }
  return 'Red';
}

function applySameHueRescue(score, de, dLp, dCp, hueDist) {
  const lowScoreBoost = SCORING_PARAMS.sameHueRescue?.lowScoreBoost || 0;
  const midScoreBoost = SCORING_PARAMS.sameHueRescue?.midScoreBoost || 0;
  const absDeltaL = Math.abs(dLp);
  const absDeltaC = Math.abs(dCp);
  const sbExtent = Math.max(absDeltaL, absDeltaC);

  if (lowScoreBoost > 0 && de >= 12 && score <= 5.75 && sbExtent >= 16) {
    const closeHueWeight = Math.max(0, 1 - hueDist / 12);
    const sbWindow = Math.min(1, Math.max(0, sbExtent - 16) / 20);
    const lowScoreWindow = Math.min(1, Math.max(0, 5.75 - score) / 2.75);
    score += lowScoreBoost * closeHueWeight * Math.max(0.35, sbWindow) * lowScoreWindow;
  }

  if (midScoreBoost > 0 && de <= 18 && score <= 6.9 && sbExtent >= 14) {
    const veryCloseHueWeight = Math.max(0, 1 - hueDist / 5);
    const sbWindow = Math.min(1, Math.max(0, sbExtent - 14) / 12);
    const midScoreWindow = Math.min(1, Math.max(0, 6.9 - score) / 1.9);
    score += midScoreBoost * veryCloseHueWeight * sbWindow * midScoreWindow;
  }

  return score;
}

function effectiveDeltaE(de, dLp, dCp, hueDist) {
  const absDeltaL = Math.abs(dLp);
  const absDeltaC = Math.abs(dCp);
  const sbExcess = Math.max(0, Math.max(absDeltaL, absDeltaC) - 14);
  const hueWeight = Math.max(0, 1 - hueDist / Math.max(1, SCORING_PARAMS.hueRecovery.thresholdDegrees));
  const hueWindow = Math.max(0, 1 - Math.abs(hueDist - 19) / 9);
  const deltaWindow = Math.max(0, 1 - de / 14);
  return de
    + (SCORING_PARAMS.guardPenalty.sameHueSbPenaltyRate || 0) * sbExcess * hueWeight
    + (SCORING_PARAMS.guardPenalty.midHuePenaltyRate || 0) * 6 * hueWindow * deltaWindow;
}

function scoreGuess(target, guess) {
  const labT = hsbToLab(target.h, target.s, target.b);
  const labG = hsbToLab(guess.h, guess.s, guess.b);
  const [de, dLp, dCp, dHp] = deltaE2000(labT, labG);
  const hueDist = hueDistance(target.h, guess.h);
  const effectiveDe = effectiveDeltaE(de, dLp, dCp, hueDist);
  let score = scoreFromDeltaE(effectiveDe);
  if (hueDist <= SCORING_PARAMS.hueRecovery.thresholdDegrees) {
    const lost = 10 - score;
    const recovery = SCORING_PARAMS.hueRecovery.lostPointRate
      * (1 - hueDist / SCORING_PARAMS.hueRecovery.thresholdDegrees);
    score = Math.round((score + lost * recovery) * 100) / 100;
  }
  score = applySameHueRescue(score, de, dLp, dCp, hueDist);
  score = Math.round(Math.max(0, Math.min(10, score)) * 100) / 100;
  return {
    delta_e: Math.round(de * 10) / 10,
    delta_l: Math.round(dLp * 10) / 10,
    delta_c: Math.round(dCp * 10) / 10,
    delta_h: Math.round(dHp * 10) / 10,
    dLp: Math.round(dLp * 10) / 10,
    dCp: Math.round(dCp * 10) / 10,
    dHp: Math.round(dHp * 10) / 10,
    hueDist: Math.round(hueDist * 10) / 10,
    score,
    target_name: hueName(target.h),
    guess_name: hueName(guess.h),
  };
}
// --- Shared scorer block: end ---

function deltaE76(lab1, lab2) {
  return Math.sqrt((lab1[0]-lab2[0])**2 + (lab1[1]-lab2[1])**2 + (lab1[2]-lab2[2])**2);
}

// --- XKCD color naming engine ---
// Lazy-init: precomputes LAB + HSB for all 949 entries once (~1ms), cached globally.
// Per-round: O(n) CIEDE2000 scan over cached LABs (~0.5ms per round).

var _xkcdCache = null;

function _ensureXkcdCache() {
  if (_xkcdCache) return _xkcdCache;
  var colors = window.XKCD_COLORS || [];
  _xkcdCache = colors.map(function (c) {
    var r = parseInt(c.hex.slice(1, 3), 16) / 255;
    var g = parseInt(c.hex.slice(3, 5), 16) / 255;
    var b = parseInt(c.hex.slice(5, 7), 16) / 255;
    // rgbToXyz linearizes internally via srgbToLinear — pass raw sRGB [0,1]
    var xyz = rgbToXyz(r, g, b);
    var lab = xyzToLab(xyz[0], xyz[1], xyz[2]);
    return { name: c.name, hex: c.hex, h: c.h, s: c.s, b: c.b, lab: lab };
  });
  return _xkcdCache;
}

function buildCallChoices(targetHSB) {
  var cache = _ensureXkcdCache();
  var targetLab = hsbToLab(targetHSB.h, targetHSB.s, targetHSB.b);
  // O(n) pass: compute CIEDE2000 distance for each cached entry
  var ranked = cache.map(function (c, i) {
    return { idx: i, dist: deltaE2000(targetLab, c.lab)[0] };
  });
  // Partial sort: find top 100 by distance (avoids full O(n log n) sort)
  var topK = 100;
  for (var k = 0; k < topK && k < ranked.length; k++) {
    var minIdx = k;
    for (var j = k + 1; j < ranked.length; j++) {
      if (ranked[j].dist < ranked[minIdx].dist) minIdx = j;
    }
    if (minIdx !== k) {
      var tmp = ranked[k]; ranked[k] = ranked[minIdx]; ranked[minIdx] = tmp;
    }
  }
  // Distractor spread: mix of difficulties so wrong picks cost real points
  // Correct answer: nearest name (rank 0)
  // Hard: 2 from ranks 1-4 (similar names — tests precision)
  // Medium: 2 from ranks 8-20 (same color region — tests vocabulary)
  // Far: 3 from ranks 40-99 (different color family — punishes wild guesses)
  var correct = cache[ranked[0].idx];
  var hard = shuffle(ranked.slice(1, 5).map(function (r) { return cache[r.idx]; })).slice(0, 2);
  var medium = shuffle(ranked.slice(8, 21).map(function (r) { return cache[r.idx]; })).slice(0, 2);
  var far = shuffle(ranked.slice(40, topK).map(function (r) { return cache[r.idx]; })).slice(0, 3);
  var all = shuffle([correct].concat(hard, medium, far));
  var correctIdx = -1;
  for (var i = 0; i < all.length; i++) {
    if (all[i] === correct) { correctIdx = i; break; }
  }
  return {
    choices: all.map(function (c) { return { name: c.name, hex: c.hex, h: c.h, s: c.s, b: c.b }; }),
    correctIdx: correctIdx,
  };
}

// --- Client-side color generation ---
function generateColors(n = 5) {
  const colors = [];
  const labs = [];
  for (let i = 0; i < 200 && colors.length < n; i++) {
    const h = Math.random() * 360;
    const s = 35 + Math.random() * 65;
    const b = 35 + Math.random() * 65;
    const lab = hsbToLab(h, s, b);
    if (labs.some(l => deltaE76(lab, l) < 20)) continue;
    labs.push(lab);
    colors.push({ h: +h.toFixed(1), s: +s.toFixed(1), b: +b.toFixed(1) });
  }
  while (colors.length < n) {
    colors.push({ h: +(Math.random()*360).toFixed(1), s: +(35+Math.random()*65).toFixed(1), b: +(35+Math.random()*65).toFixed(1) });
  }
  return colors;
}

function generateDistractors(target, n = 3) {
  const distractors = [];
  const dLabs = [];
  const tLab = hsbToLab(target.h, target.s, target.b);
  for (let i = 0; i < 200 && distractors.length < n; i++) {
    const h = Math.random() * 360;
    const s = 35 + Math.random() * 65;
    const b = 35 + Math.random() * 65;
    const lab = hsbToLab(h, s, b);
    const de = deltaE76(tLab, lab);
    if (de < 15 || de > 50) continue;
    if (dLabs.some(l => deltaE76(lab, l) < 15)) continue;
    dLabs.push(lab);
    distractors.push({ h: +h.toFixed(1), s: +s.toFixed(1), b: +b.toFixed(1) });
  }
  while (distractors.length < n) {
    distractors.push({ h: +(Math.random()*360).toFixed(1), s: +(35+Math.random()*65).toFixed(1), b: +(35+Math.random()*65).toFixed(1) });
  }
  return distractors;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// --- Error toast ---
let errorToastTimer = null;
function showError(msg) {
  const toast = document.getElementById('errorToast');
  document.getElementById('errorToastMsg').textContent = msg || "Couldn't connect";
  toast.classList.add('visible');
  clearTimeout(errorToastTimer);
  errorToastTimer = setTimeout(() => toast.classList.remove('visible'), 5000);
}
function hideError() {
  document.getElementById('errorToast').classList.remove('visible');
  clearTimeout(errorToastTimer);
}
function retryLastMode() {
  hideError();
  if (lastMode) startGame(lastMode);
}

// --- Game Flow ---
function startGame(mode) {
  challengeCode = null;
  challengePlayerName = null;
  lastMode = mode;
  hideError();
  targetColors = generateColors(5);
  if (mode === 'picture') {
    pictureChoices = targetColors.map(c => {
      const options = [c, ...generateDistractors(c, 3)];
      return shuffle(options);
    });
    callChoices = [];
  } else if (mode === 'call') {
    callChoices = targetColors.map(c => buildCallChoices(c));
    pictureChoices = [];
  } else {
    pictureChoices = [];
    callChoices = [];
  }
  guesses = [];
  currentPick = 0;
  roundResults = [];
  analytics.gameStarted(mode, pickerType);

  if (mode === 'play') {
    runCountdown();
  } else {
    startPicking();
  }
}

function runCountdown() {
  showScreen('countdown');
  let count = 3;
  const el = document.getElementById('countdownNum');
  el.textContent = count;
  el.className = 'countdown-num enter';
  const iv = setInterval(() => {
    count--;
    if (count <= 0) {
      clearInterval(iv);
      el.className = 'countdown-num exit';
      setTimeout(startMemorize, 150);
    } else {
      el.className = 'countdown-num exit';
      setTimeout(() => {
        el.textContent = count;
        el.className = 'countdown-num enter';
      }, 150);
    }
  }, 1000);
}

function startMemorize() {
  analytics.memorizeStarted();
  showScreen('memorize');
  const grid = document.getElementById('memorizeGrid');
  grid.innerHTML = '';
  const c = targetColors[currentPick];
  document.getElementById('memorizeLabel').textContent = `Color ${currentPick + 1} of 5 — memorize!`;
  // Adaptive overlay: lighten pill on dark targets so text stays readable
  const overlay = document.getElementById('memorize').querySelector('.memorize-overlay');
  overlay.classList.toggle('on-dark', c.b < 40 || (c.b < 55 && c.s < 30));
  const div = document.createElement('div');
  div.className = 'color-swatch';
  div.style.background = hsbToHsl(c.h, c.s, c.b);
  grid.appendChild(div);

  let remaining = 5;
  let lastCeil = 5;
  const fill = document.getElementById('timerFill');
  const txt = document.getElementById('timerText');
  fill.style.width = '100%';
  txt.textContent = '5s';

  if (memorizeTimer) clearInterval(memorizeTimer);
  memorizeTimer = setInterval(() => {
    remaining -= 0.1;
    fill.style.width = (remaining / 5 * 100) + '%';
    var c = Math.ceil(remaining);
    if (c !== lastCeil) { txt.textContent = c + 's'; lastCeil = c; }
    if (remaining <= 0) {
      clearInterval(memorizeTimer);
      memorizeTimer = null;
      startPicking();
    }
  }, 100);
}

    const { choices } = callChoices[currentPick];
    area.innerHTML = `
      <div class="call-stage">
        <div class="call-swatch" style="background:${hsbToHsl(tc.h, tc.s, tc.b)}"></div>
        <div class="call-choices">${choices.map((c, i) =>
          `<button class="call-choice" onclick="selectChoice(${i})">${c.name}</button>`
        ).join('')}</div>
      </div>`;
  } else if (lastMode === 'match') {
    const tc = targetColors[currentPick];
    const targetCss = hsbToHsl(tc.h, tc.s, tc.b);
    area.innerHTML = `
      <div class="stage-frame">
        <div class="match-compare">
          <div class="match-compare-col">
            <div class="match-compare-swatch" id="targetSwatch" style="background:${targetCss}"></div>
            <div class="match-compare-label">Target</div>
          </div>
          <div class="match-compare-divider"></div>
          <div class="match-compare-col">
            <div class="match-compare-swatch" id="guessSwatch" style="background:${guessCss}"></div>
          </div>
        </div>
      </div>`;
    document.getElementById('confirmBtn').disabled = false;
  } else {
    area.innerHTML = `
      <div class="stage-frame">
        <div class="preview-swatch" id="previewSwatch" style="background:${guessCss}"></div>
      </div>`;
    document.getElementById('confirmBtn').disabled = false;
  }
}

function updatePickUI() {
  if (lastMode === 'split' || lastMode === 'picture' || lastMode === 'call') return;
  const guessCss = hsbToHsl(currentHSB.h, currentHSB.s, currentHSB.b);
  if (lastMode === 'match') {
    const el = document.getElementById('guessSwatch');
    if (el) { el.style.background = guessCss; return; }
  } else {
    const el = document.getElementById('previewSwatch');
    if (el) { el.style.background = guessCss; return; }
  }
  initPickStage();
}

function confirmPick() {
  let guess;
  let callMeta = null;
  if (lastMode === 'picture') {
    if (selectedChoice < 0) return;
    const chosen = pictureOptionsFor(currentPick)[selectedChoice];
    guess = { h: chosen.h, s: chosen.s, b: chosen.b };
  } else if (lastMode === 'call') {
    if (selectedChoice < 0) return;
    const round = callChoices[currentPick];
    const chosen = round.choices[selectedChoice];
    const correct = round.choices[round.correctIdx];
    guess = { h: chosen.h, s: chosen.s, b: chosen.b };
    callMeta = { chosenName: chosen.name, correctName: correct.name };
  } else {
    guess = { ...currentHSB };
  }
  guesses.push(guess);
  const target = targetColors[currentPick];
  const result = scoreGuess(target, guess);
  result.target = target;
  result.guess = guess;
  if (callMeta) {
    result.call_chosen_name = callMeta.chosenName;
    result.call_correct_name = callMeta.correctName;
    // Correct name pick = perfect score
    if (callMeta.chosenName === callMeta.correctName) result.score = 10;
  }
  roundResults.push(result);

  // Analytics: find correct index for choice-based modes
  var correctIdx = null;
  var callChosenName = null, callCorrectName = null;
  if (lastMode === 'picture') {
    var opts = pictureOptionsFor(currentPick);
    for (var i = 0; i < opts.length; i++) {
      if (opts[i].h === target.h && opts[i].s === target.s && opts[i].b === target.b) { correctIdx = i; break; }
    }
  } else if (lastMode === 'call') {
    correctIdx = callChoices[currentPick].correctIdx;
    callChosenName = callMeta.chosenName;
    callCorrectName = callMeta.correctName;
  }
  var choiceMode = lastMode === 'picture' || lastMode === 'call';
  analytics.roundCompleted(currentPick, result, lastMode,
    lastMode === 'split' ? 'split' : choiceMode ? 'none' : pickerType,
    choiceMode ? selectedChoice : null, correctIdx,
    callChosenName, callCorrectName);

  showReveal(result, currentPick);
}

function selectChoice(idx) {
  selectedChoice = idx;
  confirmPick();
}

function showReveal(result, roundIndex) {
  showScreen('reveal');
  document.getElementById('revealProgress').innerHTML = `${roundIndex + 1} <span class="reveal-progress-dim">/ 5</span>`;
  const scoreEl = document.getElementById('revealScore');
  scoreEl.className = 'reveal-score-num';
  scoreEl.style.color = hsbToHsl(result.target.h, result.target.s, result.target.b);
  animateScore(scoreEl, result.score, 200, 500, 50);
  document.getElementById('revealTarget').style.background =
    hsbToHsl(result.target.h, result.target.s, result.target.b);
  document.getElementById('revealGuess').style.background =
    hsbToHsl(result.guess.h, result.guess.s, result.guess.b);
  document.getElementById('revealVerdict').textContent = colorFeedbackText(result.score);

  // Call It: show correct name vs chosen name
  const callNamesEl = document.getElementById('revealCallNames');
  if (lastMode === 'call' && result.call_correct_name) {
    callNamesEl.style.display = '';
    document.getElementById('revealCorrectName').innerHTML = xkcdLink(result.call_correct_name);
    const chosenEl = document.getElementById('revealChosenName');
    chosenEl.innerHTML = xkcdLink(result.call_chosen_name);
    var wasCorrect = result.call_chosen_name === result.call_correct_name;
    chosenEl.className = 'reveal-call-name ' + (wasCorrect ? 'call-correct' : 'call-wrong');
  } else {
    callNamesEl.style.display = 'none';
  }

  const hsbEl = document.getElementById('revealHSB');
  hsbEl.style.display = lastMode === 'split' ? '' : 'none';
  hsbEl.innerHTML = revealSliders(result.target, result.guess);
  scoreEl.focus();
}

function revealSliders(target, guess) {
  function pin(pct, color, label) {
    return `<div style="position:absolute;left:${pct}%;top:50%;transform:translate(-50%,-50%)" title="${label}">` +
      `<div style="width:10px;height:10px;border-radius:50%;background:${color};border:2px solid ${color === '#fff' ? 'rgba(255,255,255,0.9)' : 'rgba(0,0,0,0.3)'};box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>` +
      `</div>`;
  }
  function bar(label, max, tVal, gVal, gradient) {
    const tPct = (tVal / max * 100).toFixed(1);
    const gPct = (gVal / max * 100).toFixed(1);
    return `<div style="display:grid;grid-template-columns:16px 1fr;align-items:center;gap:8px">` +
      `<span style="font-size:0.7rem;color:var(--text-muted);text-transform:uppercase">${label}</span>` +
      `<div style="position:relative;height:8px;border-radius:4px;background:${gradient}">` +
      pin(tPct, '#fff', `Target: ${Math.round(tVal)}`) +
      pin(gPct, 'rgba(255,255,255,0.45)', `Guess: ${Math.round(gVal)}`) +
      `</div></div>`;
  }
  const hueGrad = 'linear-gradient(90deg,hsl(0,100%,50%),hsl(60,100%,50%),hsl(120,100%,50%),hsl(180,100%,50%),hsl(240,100%,50%),hsl(300,100%,50%),hsl(360,100%,50%))';
  const satGrad = `linear-gradient(90deg,hsl(${target.h},0%,50%),hsl(${target.h},100%,50%))`;
  const briGrad = `linear-gradient(90deg,#000,hsl(${target.h},${target.s}%,50%))`;
  return `<div style="display:grid;gap:8px">` +
    bar('H', 360, target.h, guess.h, hueGrad) +
    bar('S', 100, target.s, guess.s, satGrad) +
    bar('B', 100, target.b, guess.b, briGrad) +
    `</div>`;
}

function toggleRevealDetail() {
  const el = document.getElementById('revealHSB');
  el.style.display = el.style.display === 'none' ? '' : 'none';
}

function continueAfterReveal() {
  currentPick++;
  if (currentPick >= 5) {
    persistAndShowResults();
  } else if (lastMode === 'play') {
    startMemorize();
  } else {
    startPicking();
  }
}

function persistAndShowResults() {
  const total = Math.round(roundResults.reduce((s, r) => s + r.score, 0) * 100) / 100;
  analytics.gameCompleted(lastMode, pickerType, total, roundResults.map(r => r.score));
  // Fire-and-forget persist to server
  fetch('/api/game/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      mode: lastMode,
      picker_type: pickerType,
      target_colors: targetColors,
      guesses: guesses,
      scores: roundResults.map(r => r.score),
      total_score: total,
    }),
  }).catch(e => console.warn('Game persist failed:', e));
  // Save to localStorage
  saveToHistory({
    mode: lastMode,
    picker_type: pickerType,
    date: new Date().toISOString(),
    total_score: total,
    results: roundResults,
    target_colors: targetColors,
    challenge_code: challengeCode || null,
  });
  showResults({ results: roundResults, total_score: total });
  // If playing a challenge, auto-trigger name entry for submission
  if (challengeCode && !challengePlayerName) {
    setTimeout(function() {
      showNameEntry(function(name) {
        submitChallengeEntry(challengeCode, name);
      }, 'Submit');
    }, 600);
  }
}

function saveToHistory(game) {
  try {
    const all = JSON.parse(localStorage.getItem('gameHistory') || '[]');
    all.unshift(game);
    // Always keep challenge games; cap solo games at 20 per mode by score
    const challenges = all.filter(g => g.challenge_code);
    const solo = all.filter(g => !g.challenge_code);
    const byMode = {};
    solo.forEach(g => {
      if (!byMode[g.mode]) byMode[g.mode] = [];
      byMode[g.mode].push(g);
    });
    const kept = [...challenges];
    for (const mode in byMode) {
      byMode[mode].sort((a, b) => b.total_score - a.total_score);
      kept.push(...byMode[mode].slice(0, 20));
    }
    localStorage.setItem('gameHistory', JSON.stringify(kept));
  } catch (e) {}
}
