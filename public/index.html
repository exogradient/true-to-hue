// Field (hue bar + SB plane)
function renderField(container) {
  container.innerHTML = `
    <div class="field-picker">
      <div class="hue-bar" id="hueBar"><div class="hue-thumb" id="hueThumb"></div></div>
      <div class="sb-field" id="sbField">
        <canvas class="sb-field-bg" id="sbCanvas"></canvas>
        <div class="sb-thumb" id="sbThumb"></div>
      </div>
    </div>`;

  const hueBar = document.getElementById('hueBar');
  const hueThumb = document.getElementById('hueThumb');
  const sbField = document.getElementById('sbField');
  const sbCanvas = document.getElementById('sbCanvas');
  const sbThumb = document.getElementById('sbThumb');

  function updateHueThumb() {
    const pct = currentHSB.h / 360;
    hueThumb.style.left = (pct * 100) + '%';
  }

  let _sbW = 0, _sbH = 0;
  function drawSB() {
    const rect = sbField.getBoundingClientRect();
    const w = Math.round(rect.width);
    const h = Math.round(rect.height);
    if (w !== _sbW || h !== _sbH) { sbCanvas.width = w; sbCanvas.height = h; _sbW = w; _sbH = h; }
    const ctx = sbCanvas.getContext('2d');

    // HSB SB field using gradient overlays (much faster than pixel-by-pixel)
    // Layer 1: horizontal gradient from white to pure hue
    const hGrad = ctx.createLinearGradient(0, 0, w, 0);
    hGrad.addColorStop(0, '#fff');
    hGrad.addColorStop(1, `hsl(${currentHSB.h}, 100%, 50%)`);
    ctx.fillStyle = hGrad;
    ctx.fillRect(0, 0, w, h);

    // Layer 2: vertical gradient from transparent to black
    const vGrad = ctx.createLinearGradient(0, 0, 0, h);
    vGrad.addColorStop(0, 'rgba(0,0,0,0)');
    vGrad.addColorStop(1, '#000');
    ctx.fillStyle = vGrad;
    ctx.fillRect(0, 0, w, h);
  }

  function updateSBThumb() {
    const pctX = currentHSB.s / 100;
    const pctY = 1 - currentHSB.b / 100;
    sbThumb.style.left = (pctX * 100) + '%';
    sbThumb.style.top = (pctY * 100) + '%';
  }

  // Hue bar interaction
  function handleHue(e) {
    const rect = hueBar.getBoundingClientRect();
    const x = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    currentHSB.h = Math.round(x * 360);
    updateHueThumb();
    drawSB();
    updatePickUI();
    analytics.pickerAdjusted();
  }

  let hueDown = false;
  hueBar.addEventListener('pointerdown', e => { hueDown = true; hueBar.setPointerCapture(e.pointerId); handleHue(e); });
  hueBar.addEventListener('pointermove', e => { if (hueDown) handleHue(e); });
  hueBar.addEventListener('pointerup', () => { hueDown = false; });

  // SB field interaction
  function handleSB(e) {
    const rect = sbField.getBoundingClientRect();
    const x = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    const y = Math.max(0, Math.min(1, (e.clientY - rect.top) / rect.height));
    currentHSB.s = Math.round(x * 100);
    currentHSB.b = Math.round((1 - y) * 100);
    updateSBThumb();
    updatePickUI();
    analytics.pickerAdjusted();
  }

  let sbDown = false;
  sbField.addEventListener('pointerdown', e => { sbDown = true; sbField.setPointerCapture(e.pointerId); handleSB(e); });
  sbField.addEventListener('pointermove', e => { if (sbDown) handleSB(e); });
  sbField.addEventListener('pointerup', () => { sbDown = false; });

  // Initial draw
  updateHueThumb();
  requestAnimationFrame(() => { drawSB(); updateSBThumb(); });
}

// --- Results ---
function showResults(data) {
  showScreen('results');
  var metaDetail = lastMode === 'call' ? 'name matching'
    : lastMode === 'picture' ? 'multiple choice'
    : lastMode === 'split' ? 'slider estimation'
    : `${pickerLabel(pickerType)} picker`;
  document.getElementById('resultsMeta').textContent = `${modeLabel(lastMode)} · ${metaDetail}`;
  const tier = totalTierClass(data.total_score);
  const tierEl = document.getElementById('scoreTier');
  tierEl.textContent = scoreTierText(data.total_score);
  tierEl.className = 'score-tier' + (tier ? ` ${tier}` : '');
  updateAdvancedHint();

  const scoreEl = document.getElementById('totalScore');
  scoreEl.className = 'total-score' + (tier ? ` ${tier}` : '');
  animateScore(scoreEl, data.total_score, 300, 800, 16);

  const feedbackEl = document.getElementById('totalFeedback');
  feedbackEl.textContent = totalFeedbackText(data.total_score);
  feedbackEl.style.display = showAdvanced ? '' : 'none';

  const cards = document.getElementById('resultCards');
  cards.innerHTML = '';
  const detailClass = showAdvanced ? 'result-detail-wrap visible' : 'result-detail-wrap';
  data.results.forEach((r, i) => {
    const card = document.createElement('div');
    var isCall = lastMode === 'call' || !!r.call_correct_name;
    card.className = `result-card ${resultTierClass(r.score)}${isCall ? ' call-card' : ''}`;
    card.style.animationDelay = `${100 * (i + 1)}ms`;
    const tCss = hsbToHsl(r.target.h, r.target.s, r.target.b);
    const gCss = hsbToHsl(r.guess.h, r.guess.s, r.guess.b);
    card.setAttribute('tabindex', '0');
    card.setAttribute('role', 'button');
    card.setAttribute('aria-expanded', String(showAdvanced));
    card.onclick = () => {
      const wrap = card.querySelector('.result-detail-wrap');
      const next = !wrap.classList.contains('visible');
      wrap.classList.toggle('visible', next);
      card.setAttribute('aria-expanded', String(next));
    };
    card.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.click(); }
    });
    var callNameHtml = '';
    if (isCall) {
      var wasRight = r.call_chosen_name === r.call_correct_name;
      callNameHtml = wasRight
        ? `<div class="call-result-name">${xkcdLink(r.call_correct_name)}</div>`
        : `<div class="call-result-name">${xkcdLink(r.call_correct_name)}</div>
           <div class="call-result-yours">you said ${xkcdLink(r.call_chosen_name)}</div>`;
    }
    card.innerHTML = `
      <div>
        <div class="swatch-compare">
          <div class="swatch-target" style="background:${tCss}"></div>
          <div class="swatch-guess" style="background:${gCss}"></div>
          <div class="swatch-divider"></div>
        </div>
      </div>
      <div class="result-info">
        <div class="result-head">
          ${isCall ? callNameHtml : `<div><div class="result-verdict">${colorFeedbackText(r.score)}</div></div>
          <div class="result-names">${r.target_name} to ${r.guess_name}</div>`}
        </div>
        <div class="${detailClass}">
          ${revealSliders(r.target, r.guess)}
        </div>
      </div>
      <div class="result-score"><span>${r.score.toFixed(1)}</span></div>`;
    cards.appendChild(card);
  });
}

function toggleAdvanced() {
  showAdvanced = !showAdvanced;
  document.getElementById('totalFeedback').style.display = showAdvanced ? '' : 'none';
  document.querySelectorAll('.result-detail-wrap').forEach(el => {
    el.classList.toggle('visible', showAdvanced);
  });
  document.querySelectorAll('.result-card').forEach(card => {
    card.setAttribute('aria-expanded', String(showAdvanced));
  });
  updateAdvancedHint();
}

function colorFeedbackText(score) {
  if (score >= 9.5) return 'Perfect!';
  if (score >= 8.5) return 'Excellent';
  if (score >= 7) return 'Great';
  if (score >= 5) return 'Good';
  if (score >= 3) return 'Okay';
  return 'Keep practicing';
}

function totalFeedbackText(score) {
  if (score >= 42) return 'Near-perfect perception. You are reading tiny differences without forcing it.';
  if (score >= 35) return 'Very strong round. Your eye is already making fine-grain corrections.';
  if (score >= 25) return 'Solid round. You are seeing the structure, even if a few channels still drift.';
  if (score >= 15) return 'Useful reps. The misses are readable enough to teach from.';
  return 'Good training material. The analysis below should make the misses concrete.';
}

// --- History (localStorage) ---
function showHistory() {
  showScreen('historyScreen');
  let all;
  try { all = JSON.parse(localStorage.getItem('gameHistory') || '[]'); }
  catch (e) { all = []; }

  const modes = ['play', 'match', 'picture', 'call', 'split'];
  const activeMode = showHistoryMode;
  const filtered = all
    .filter(g => g.mode === activeMode)
    .sort((a, b) => b.total_score - a.total_score);

  const list = document.getElementById('historyList');
  const tabs = modes.map(m =>
    `<button class="history-tab${m === activeMode ? ' active' : ''}" onclick="switchHistoryMode('${m}')">${modeLabel(m)}</button>`
  ).join('');

  let content = `<div class="history-tabs">${tabs}</div>`;
  if (filtered.length === 0) {
    content += '<div class="panel-subtle" style="padding:var(--space-5);text-align:center;color:var(--text-muted);">No rounds yet.</div>';
  } else {
    content += filtered.map((g, i) => {
      const d = new Date(g.date);
      const time = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const colors = (g.target_colors || []).map(c =>
        `<div class="history-color-dot" style="background:${hsbToHsl(c.h, c.s, c.b)}"></div>`
      ).join('');
      const badge = g.challenge_code
        ? `<span class="history-challenge-badge">${g.challenge_code}</span>`
        : '';
      return `<div class="history-row" onclick="viewHistoryGame(${i}, '${g.mode}')" style="cursor:pointer">
        <div class="history-entry">
          ${modeIconMarkup(g.mode, 'history-icon')}
          <div class="history-meta">
            <span class="history-mode">${modeLabel(g.mode)}</span>
            <span class="history-sub">${time}${badge}</span>
          </div>
        </div>
        <div class="history-colors">${colors}</div>
        <div class="history-score">${g.total_score.toFixed(1)}</div>
      </div>`;
    }).join('');
  }
  list.innerHTML = content;
}

function switchHistoryMode(mode) {
  showHistoryMode = mode;
  showHistory();
}

function viewHistoryGame(idx, mode) {
  let all;
  try { all = JSON.parse(localStorage.getItem('gameHistory') || '[]'); }
  catch (e) { return; }
  const filtered = all
    .filter(g => g.mode === mode)
    .sort((a, b) => b.total_score - a.total_score);
  const game = filtered[idx];
  if (!game) return;
  lastMode = game.mode;
  if (game.picker_type) pickerType = game.picker_type;
  targetColors = game.target_colors || [];
  roundResults = game.results || [];
  guesses = roundResults.map(function(r) { return r.guess; });
  // If it's a challenge game, fetch the leaderboard
  if (game.challenge_code) {
    challengeCode = game.challenge_code;
    var savedName = '';
    try { savedName = localStorage.getItem('challengeName') || ''; } catch {}
    challengePlayerName = savedName;
    fetch('/api/challenge/' + encodeURIComponent(game.challenge_code))
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(data) {
      if (data) showChallengeScreen(data);
      else showResults({ results: game.results, total_score: game.total_score });
    })
    .catch(function() {
      showResults({ results: game.results, total_score: game.total_score });
    });
  } else {
    showResults({ results: game.results, total_score: game.total_score });
  }
}

// --- Challenge / Share ---

function shareGame() {
  if (challengeCode && !challengePlayerName) {
    showNameEntry(function(name) {
      submitChallengeEntry(challengeCode, name);
    }, 'Submit');
  } else {
    showNameEntry(function(name) {
      createChallenge(name);
    });
  }
}

function showNameEntry(callback, label) {
  _nameCallback = callback;
  var input = document.getElementById('nameInput');
  var savedName = '';
  try { savedName = localStorage.getItem('challengeName') || ''; } catch {}
  input.value = savedName;
  document.getElementById('nameError').textContent = '';
  document.getElementById('nameSheet').classList.add('visible');
  document.getElementById('nameSubmitBtn').textContent = label || 'Share';
  document.getElementById('nameSubmitBtn').disabled = false;
  input.focus();
  if (savedName) input.select();
}

function hideNameEntry() {
  document.getElementById('nameSheet').classList.remove('visible');
  _nameCallback = null;
}

function submitName() {
  var name = document.getElementById('nameInput').value.trim();
  if (!name) {
    document.getElementById('nameError').textContent = 'Name is required';
    return;
  }
  if (name.length > 20) {
    document.getElementById('nameError').textContent = 'Max 20 characters';
    return;
  }
  document.getElementById('nameSubmitBtn').disabled = true;
  document.getElementById('nameError').textContent = '';
  if (_nameCallback) _nameCallback(name);
}

function tagLastHistoryWithChallenge(code) {
  try {
    var all = JSON.parse(localStorage.getItem('gameHistory') || '[]');
    if (all.length > 0 && !all[0].challenge_code) {
      all[0].challenge_code = code;
      localStorage.setItem('gameHistory', JSON.stringify(all));
    }
  } catch {}
}

function createChallenge(name) {
  var total = roundResults.reduce(function(s, r) { return s + r.score; }, 0);
  fetch('/api/challenge', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      mode: lastMode,
      target_colors: targetColors,
      name: name,
      guesses: guesses,
      scores: roundResults.map(function(r) { return r.score; }),
      total_score: Math.round(total * 100) / 100,
    }),
  })
  .then(function(r) {
    if (!r.ok) return r.json().then(function(e) { throw new Error(e.detail || 'Failed'); });
    return r.json();
  })
  .then(function(data) {
    hideNameEntry();
    challengeCode = data.code;
    challengePlayerName = name;
    try { localStorage.setItem('challengeName', name); } catch {}
    tagLastHistoryWithChallenge(data.code);
    showChallengeScreen(data);
  })
  .catch(function(e) {
    document.getElementById('nameError').textContent = e.message || 'Could not create challenge';
    document.getElementById('nameSubmitBtn').disabled = false;
  });
}

function joinChallenge(code) {
  fetch('/api/challenge/' + encodeURIComponent(code))
  .then(function(r) {
    if (!r.ok) {
      if (r.status === 404) throw new Error('Challenge not found');
      throw new Error('Failed to load challenge');
    }
    return r.json();
  })
  .then(function(data) {
    challengeCode = data.code;
    challengePlayerName = null;
    startChallengeGame(data);
  })
  .catch(function(e) {
    showError(e.message);
  });
}

function startChallengeGame(data) {
  lastMode = data.mode;
  hideError();
  targetColors = data.target_colors;

  if (data.mode === 'picture') {
    pictureChoices = targetColors.map(function(c) {
      var options = [c].concat(generateDistractors(c, 3));
      return shuffle(options);
    });
    callChoices = [];
  } else if (data.mode === 'call') {
    callChoices = targetColors.map(function(c) { return buildCallChoices(c); });
    pictureChoices = [];
  } else {
    pictureChoices = [];
    callChoices = [];
  }
  guesses = [];
  currentPick = 0;
  roundResults = [];
  analytics.gameStarted(data.mode, pickerType);

  if (data.mode === 'play') {
    runCountdown();
  } else {
    startPicking();
  }
}

function submitChallengeEntry(code, name) {
  document.getElementById('nameSubmitBtn').disabled = true;
  var total = roundResults.reduce(function(s, r) { return s + r.score; }, 0);
  fetch('/api/challenge/' + encodeURIComponent(code), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      name: name,
      guesses: guesses,
      scores: roundResults.map(function(r) { return r.score; }),
      total_score: Math.round(total * 100) / 100,
    }),
  })
  .then(function(r) {
    if (!r.ok) return r.json().then(function(e) { throw new Error(e.detail || 'Failed'); });
    return r.json();
  })
  .then(function(data) {
    hideNameEntry();
    challengePlayerName = name;
    try { localStorage.setItem('challengeName', name); } catch {}
    showChallengeScreen(data);
  })
  .catch(function(e) {
    document.getElementById('nameError').textContent = e.message || 'Could not submit';
    document.getElementById('nameSubmitBtn').disabled = false;
  });
}

function showChallengeScreen(data) {
  showScreen('challenge');
  document.getElementById('challengeCodeText').textContent = data.code;
  document.getElementById('challengeModeMeta').textContent = modeLabel(data.mode);

  var colors = (data.target_colors || []).map(function(c) {
    return '<div class="challenge-color-dot" style="background:' + hsbToHsl(c.h, c.s, c.b) + '"></div>';
  }).join('');
  document.getElementById('challengeColors').innerHTML = colors;

  var lb = document.getElementById('challengeLeaderboard');
  lb.innerHTML = '';
  (data.entries || []).forEach(function(entry, i) {
    var isYou = challengePlayerName && entry.name === challengePlayerName;
    var score = typeof entry.total_score === 'string' ? parseFloat(entry.total_score) : entry.total_score;
    var tierCls = totalTierClass(score);
    var row = document.createElement('div');
    row.className = 'lb-row' + (isYou ? ' lb-you' : '');
    row.innerHTML =
      '<span class="lb-rank">' + (i + 1) + '</span>' +
      '<span class="lb-name">' + escapeHtml(entry.name) + '</span>' +
      '<span class="lb-tier ' + tierCls + '">' + scoreTierText(score) + '</span>' +
      '<span class="lb-score">' + score.toFixed(1) + '</span>';
    lb.appendChild(row);
  });
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function copyCode() {
  var code = document.getElementById('challengeCodeText').textContent;
  if (!code) return;
  var url = window.location.origin + '/c/' + code;
  navigator.clipboard.writeText(url).then(function() {
    showToast('Link copied!');
  }).catch(function() {
    prompt('Copy this link:', url);
  });
}

var toastTimer = null;
function showToast(msg) {
  var toast = document.getElementById('successToast');
  document.getElementById('successToastMsg').textContent = msg;
  toast.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { toast.classList.remove('visible'); }, 2000);
}

// Name sheet: dismiss on backdrop click or Escape
document.getElementById('nameSheet').addEventListener('click', function(e) {
  if (e.target === this) hideNameEntry();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && document.getElementById('nameSheet').classList.contains('visible')) {
    hideNameEntry();
  }
});
document.getElementById('nameInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); submitName(); }
});

updateAdvancedHint();

// --- Deep link: ?challenge=CODE → auto-join challenge ---
(function() {
  var code = new URLSearchParams(window.location.search).get('challenge');
  if (code) {
    code = code.toUpperCase().replace(/[^0-9A-Z]/g, '');
    if (code) {
      history.replaceState(null, '', '/');
      joinChallenge(code);
    }
  }
})();
</script>

<div class="error-toast" id="errorToast">
  <span class="error-toast-msg" id="errorToastMsg">Couldn't connect</span>
  <button onclick="retryLastMode()">Retry</button>
</div>
